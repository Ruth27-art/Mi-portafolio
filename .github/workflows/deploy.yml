name: Deploy to GitHub Pages

on:
  # Se ejecuta automáticamente cada vez que hagas push a la rama main
  push:
    branches: ["main"]

  # Permite ejecutar el flujo manualmente desde la pestaña "Actions" en GitHub
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se solapen dos despliegues al mismo tiempo
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar aplicación (Vite)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto compilado
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
